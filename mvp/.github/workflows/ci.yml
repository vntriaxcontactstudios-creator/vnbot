name: CI

on:
  pull_request:
    branches: [main, next]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Frontend pipeline ───
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./apps/web lint
      - run: pnpm --filter ./apps/web typecheck
      - run: pnpm --filter ./apps/web test:unit -- --coverage
      - run: pnpm --filter ./apps/web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/dist/

  # ─── Backend pipeline ───
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: uv sync --all-packages
      - run: uv run ruff check services/api packages/domain
      - run: uv run mypy services/api packages/domain
      - run: uv run pytest services/api/tests/unit --cov=services/api/app --cov-fail-under=60
      - run: uv run pytest services/api/tests/integration

  # ─── Security gates (mandatory) ───
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for secret scan
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/python
            p/react
            p/typescript
      - name: pip-audit (Python deps)
        run: |
          pip install pip-audit
          pip-audit -r <(uv pip freeze)

  # ─── E2E tests with axe-core accessibility ───
  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages
      - run: pnpm e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  # ─── Quality gate (all checks must pass) ───
  quality-gate:
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, e2e]
    if: always()
    steps:
      - name: Block PR if any job failed
        if: ${{ needs.frontend.result != 'success' || needs.backend.result != 'success' || needs.security.result != 'success' || needs.e2e.result != 'success' }}
        run: exit 1
      - run: echo "All CI checks passed ✅"
