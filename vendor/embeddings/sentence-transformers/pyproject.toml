[project]
name = "sentence-transformers"
version = "5.7.0.dev0"
description = "Embeddings, Retrieval, and Reranking"
license = "Apache-2.0"
readme = "README.md"
authors = [
    { name = "Nils Reimers", email = "info@nils-reimers.de" },
    { name = "Tom Aarsen", email = "tom.aarsen@huggingface.co" },
]
maintainers = [
    { name = "Tom Aarsen", email = "tom.aarsen@huggingface.co" }
]
requires-python = ">=3.10"
keywords = [
    "Transformer Networks",
    "BERT",
    "XLNet",
    "sentence embedding",
    "PyTorch",
    "NLP",
    "deep learning",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "transformers>=4.41.0,<6.0.0",
    "tokenizers>=0.19",
    "huggingface-hub>=0.23.0",
    "torch>=1.11.0",
    "numpy>=1.20.0",
    "scikit-learn>=0.22.0",
    "scipy>=1.0.0",
    "typing_extensions>=4.5.0",
    "tqdm>=4.0.0",
]

[project.urls]
Homepage = "https://www.SBERT.net"
Repository = "https://github.com/huggingface/sentence-transformers/"


[project.optional-dependencies]
image = ["transformers[vision]"]
audio = ["transformers[audio]"]
video = ["transformers[video]"]
train = ["datasets>=2.0.0", "accelerate>=0.20.3"]
onnx = ["optimum-onnx[onnxruntime]"]
onnx-gpu = ["optimum-onnx[onnxruntime-gpu]"]
openvino = ["optimum-intel[openvino]"]
dev = [
    "datasets>=2.0.0",
    "accelerate>=0.20.3",
    "pre-commit",
    "pytest",
    "pytest-cov",
    "pytest-env",
    "pytest-subtests",
    "pytest-xdist",
    "peft",
    "transformers[vision,audio,video]",
]

[dependency-groups]
test = [
    "datasets>=2.0.0",
    "accelerate>=0.20.3",
    "pytest",
    "pytest-cov",
    "pytest-env",
    "pytest-subtests",
    "pytest-xdist",
    "peft",
    "transformers[vision,audio,video]",
]
lint = [
    "pre-commit",
]
dev = [
    {include-group = "test"},
    {include-group = "lint"},
]
docs = [
    "sphinx==8.1.3",
    "Jinja2==3.1.6",
    "myst-parser==4.0.0",
    "sphinx_markdown_tables==0.0.17",
    "sphinx-copybutton==0.5.2",
    "sphinx_inline_tabs==2023.4.21",
    "sphinx_rtd_theme==3.0.2",
    "sphinxcontrib-mermaid==1.0.0",
    "sphinx-toolbox==3.9.0",
]

[build-system]
requires = ["setuptools>=77.0.3"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["sentence_transformers*"]
namespaces = false

[tool.setuptools.package-data]
sentence_transformers = ["**/model_card_template.md", "py.typed"]

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 119
fix = true

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
# Skip `E731` (do not assign a lambda expression, use a def)
ignore = [
    # LineTooLong
    "E501",
    # DoNotAssignLambda
    "E731"
]

[tool.ruff.lint.per-file-ignores]
"examples/**" = [
    # Ignore `E402` (import violations) in all examples
    "E402", 
    # Ignore missing required imports
    "I002"
    ]
"docs/**" = [
    # Ignore missing required imports
    "I002"
    ]

[tool.ruff.lint.isort]
known-third-party = ["datasets"]
required-imports = ["from __future__ import annotations"]

[tool.ty.rules]
unresolved-attribute = "ignore" # Not nicely compatible with 'torch' its custom __setattr__

[tool.pytest.ini_options]
testpaths = [
    "tests"
]
addopts = "--strict-markers -m 'not slow and not custom'"
markers = [
    "slow: marks tests as slow",
    "custom: marks tests for third-party models with custom modules"
]
env = [
    # Avoid any ReadTimeout when making requests to the Hub (default is 10)
    # Note: 'D:' means default value from laptop or CI won't be overwritten
    "D:HF_HUB_DOWNLOAD_TIMEOUT=60",
]

[tool.typos.default]
binary = false
locale = "en"

[tool.typos.default.extend-words]
NCE = "NCE"
nce = "nce"
Ein = "Ein"
ein = "ein"
ist = "ist"
arange = "arange"


[tool.typos.files]
extend-exclude = [
    "*.json",
    "*.ipynb",
    "examples/sentence_transformer/unsupervised_learning/query_generation/3_programming_semantic_search.py",
    "examples/sentence_transformer/unsupervised_learning/query_generation/1_programming_query_generation.py",
    "sentence_transformers/sentence_transformer/modules/tokenizer/word.py",
]

[tool.typos.type.py.extend-words]
thw = "thw"
nd = "nd"
Evangelia = "Evangelia"
aas = "aas"
sur = "sur"
paria = "paria"
ende = "ende"

[tool.typos.type.py.extend-identifiers]
# for backwards compatibility, as these were previously misspelled
compute_metrices = "compute_metrices"
eucledian_distance = "eucledian_distance"
compute_metrices_batched = "compute_metrices_batched"
compute_metrices_individual = "compute_metrices_individual"