name: Unit tests

on:
  push:
    branches:
      - main
      - "*-release"
  pull_request:
    branches:
      - main
      - "*-release"
  workflow_dispatch:

env:
  TRANSFORMERS_IS_CI: 1
  HF_HUB_DISABLE_PROGRESS_BARS: 1  # The Transformers v5 weight loading progress bars heavily expand the logs
  HF_TOKEN: ${{ secrets.HF_TOKEN }}  # Read token to avoid rate limits / gated-repo failures when downloading from the Hub

jobs:
  test_sampling:
    name: Run unit tests
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]
        transformers-version: ["<5.0.0", ">=5.0.0"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Remove unnecessary files
        run: |
          df -h /
          # Remove software and language runtimes we're not using
          sudo rm -rf \
            "$AGENT_TOOLSDIRECTORY" \
            /opt/google/chrome \
            /opt/microsoft/msedge \
            /opt/microsoft/powershell \
            /opt/pipx \
            /usr/lib/mono \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift
          df -h /
        if: runner.os == 'Linux'

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          cache-suffix: "transformers-5-${{ (matrix.transformers-version == '<5.0.0') && 'minus' || 'plus' }}"

      # kenlm doesn't compile on Python 3.13, and pyctcdecode pins numpy<2.0.0
      # which conflicts with the rest of the stack. transformers[audio] also pulls
      # librosa, which needs numba, which needs llvmlite. On Python 3.13 uv backtracks
      # to the old numba 0.53.1, whose pinned llvmlite==0.36.0 only supports Python
      # <3.10 and fails to build. Exclude all of them on Python 3.13.
      - name: Create excludes file for packages without Python 3.13 support
        shell: bash
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            echo -e "kenlm\npyctcdecode\nlibrosa\nnumba\nllvmlite" > excludes.txt
          else
            touch excludes.txt
          fi

      - name: Install dependencies (transformers < 5.0.0)
        if: ${{ matrix.transformers-version == '<5.0.0' }}
        run: uv pip install '.[train, onnx, openvino]' --group test 'transformers<5.0.0' 'accelerate>=1.13.0' 'datasets>=3.3.0' --excludes excludes.txt --system

      - name: Install dependencies (transformers >= 5.0.0)
        if: ${{ matrix.transformers-version == '>=5.0.0' }}
        run: uv pip install '.[train]' --group test 'transformers>=5.0.0' 'accelerate>=1.13.0' --excludes excludes.txt --system

      # model2vec[distill] pins transformers<5.4.0, so use the distill extra only on
      # the <5.0.0 leg (distillation tests skip on v5+ anyway) and base model2vec elsewhere.
      - name: Install model2vec (with distillation extra)
        run: uv pip install 'model2vec[distill]' --system
        if: ${{ matrix.transformers-version == '<5.0.0' }}

      - name: Install model2vec
        run: uv pip install model2vec --system
        if: ${{ matrix.transformers-version == '>=5.0.0' }}

      - name: Run unit tests
        run: |
          python -m pytest --durations 20 -sv tests/
