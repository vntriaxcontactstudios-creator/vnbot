# VNBOT — Docker Compose for Fase 0.2 (Server mode)
#
# This is PREPARATION for Fase 0.2. In Fase 0.1 we run locally without Docker.
# In Fase 0.2, this file enables multi-device access with:
# - FastAPI backend (api + worker + scheduler in one container for now)
# - PostgreSQL with pgvector (replaces SQLite)
# - Redis (queue + cache + rate limiting)
# - MinIO (S3-compatible file storage)
#
# Usage (Fase 0.2):
#   docker compose up -d
#   docker compose exec api uv run alembic upgrade head
#   docker compose exec api uv run python -m app.scripts.seed

version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VNBOT_ENV=production
      - DATABASE_URL=postgresql+asyncpg://vnbot:vnbot@db:5432/vnbot
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=s3
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_BUCKET=vnbot
      - STORAGE_ACCESS_KEY=vnbot
      - STORAGE_SECRET_KEY=vnbot-secret
      - LLM_PROVIDER=zai
      - LLM_ZAI_MODEL=glm-4.6
      - SESSION_SECRET=${SESSION_SECRET:-change-me-64-hex}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-32-hex}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ../../data:/app/data
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=vnbot
      - POSTGRES_PASSWORD=vnbot
      - POSTGRES_DB=vnbot
    ports:
      - "5432:5432"
    volumes:
      - vnbot-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - vnbot-redis:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=vnbot
      - MINIO_ROOT_PASSWORD=vnbot-secret
    volumes:
      - vnbot-minio:/data
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  vnbot-db:
  vnbot-redis:
  vnbot-minio:
