# VNBOT — Netlify deployment configuration
#
# Per ADR-0008 (single-user local-first): Netlify is used ONLY for the static
# demo build (mock data). Production VNBOT runs on the user's own machine.
#
# The demo build uses VITE_DEMO_MODE=true to inject mock data instead of
# requiring the Python backend.

[build]
  command = "cd mvp && pnpm install --no-frozen-lockfile && pnpm --filter @vnbot/web build"
  publish = "mvp/apps/web/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  VITE_DEMO_MODE = "true"
  VITE_API_BASE_URL = ""

# ─── SPA fallback (React Router needs client-side routing) ───
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Cache static assets aggressively (immutable fingerprinted files) ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Service worker: no cache (always fetch latest) ───
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Manifest: short cache ───
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ─── Security headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
