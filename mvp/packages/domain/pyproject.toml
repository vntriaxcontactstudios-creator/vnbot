[project]
name = "vnbot-domain"
version = "0.1.0"
description = "VNBOT shared domain layer (pure Python, no framework imports)"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9.0",
    "python-dateutil>=2.9.0",
    "pytz>=2024.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vnbot_domain"]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-select = ["I", "B", "C4", "UP", "SIM", "PL"]
ignore = ["PLR0913", "PLR2004"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
