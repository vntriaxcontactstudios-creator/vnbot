name: CI

on:
  pull_request:
    branches: [main, next]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: mvp/pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
        working-directory: mvp
      - run: pnpm --filter ./mvp/apps/web lint
        working-directory: mvp
      - run: pnpm --filter ./mvp/apps/web typecheck
        working-directory: mvp
      - run: pnpm --filter ./mvp/apps/web build
        working-directory: mvp

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: uv sync --all-packages
        working-directory: mvp
      - run: uv run ruff check services/api packages/domain
        working-directory: mvp
      - run: uv run mypy services/api packages/domain
        working-directory: mvp
      - run: uv run pytest packages/domain/tests --tb=short
        working-directory: mvp
